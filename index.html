<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoenergyGo - Rentabilidade de Eletropostos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-group:focus-within label { color: #f97316; } /* Laranja Orange-500 */
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #fdba74; border-radius: 10px; }
        
        /* Centralização do texto nos inputs e remoção de setas */
        input { text-align: center; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .icon-upload-area:hover .upload-overlay { opacity: 1; }
        
        /* Estado de Cabeçalho Oculto */
        #mainHeader.scrolled {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">
    <div id="relatorio-area" class="bg-slate-50 pt-8 px-8 pb-0">
    <!-- Header & Branding -->
    <header id="mainHeader" class="sticky top-0 z-50 glass-header border-b border-slate-100 py-2 mb-10 transition-all duration-300 ease-in-out">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center gap-5">
            
            <!-- UPLOAD DE ÍCONE INTERATIVO -->
            <div class="flex-shrink-0">
                <label for="logoUpload" class="relative group cursor-pointer">
                    <div id="iconBox" class="w-24 h-24 bg-orange-50 rounded-2xl border-2 border-dashed border-orange-200 flex items-center justify-center overflow-hidden transition-all group-hover:border-orange-400 group-hover:bg-orange-100">
                        <div id="iconPlaceholder" class="flex flex-col items-center justify-center text-orange-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            <span class="text-[8px] font-bold uppercase tracking-tighter">Upload</span>
                        </div>
                        <img id="logoPreview" class="hidden w-full h-full object-cover">
                    </div>
                    <input type="file" id="logoUpload" accept="image/*" class="hidden">
                </label>
            </div>

            <div class="flex flex-col">
                <h1 class="text-2xl font-black text-slate-900 tracking-tight leading-none">
                    Coenergy<span class="text-orange-500">Go</span>
                </h1>
                <p class="text-xs font-medium text-gray-500 mt-1">Rentabilidade inteligente, sustentabilidade real.</p>
            </div>

            <!-- BOTÃO DE EXPORTAÇÃO -->
            <button 
                onclick="exportReport()" 
                data-html2canvas-ignore="true" 
                class="ml-auto bg-orange-500 hover:bg-orange-600 active:scale-95 text-white px-5 py-2.5 rounded-xl font-bold text-xs transition-all flex items-center gap-2 shadow-lg shadow-orange-200"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Baixar Relatório
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Input Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12 items-stretch">
            
            <!-- PROJETO -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-orange-500 h-full flex flex-col">
                <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                    <span class="w-8 h-8 bg-orange-100 text-orange-600 rounded-lg flex items-center justify-center text-sm font-bold">1</span>
                    Dados do Projeto
                </h2>
                <div class="flex-1 flex flex-col justify-between py-2">
                    <div class="input-group">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Potência do Carregador</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <input type="number" id="potencia" value="60" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                            <span class="absolute right-4 text-xs font-bold text-slate-400">kW</span>
                        </div>
                    </div>
                    <div class="input-group mt-6">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Investimento Total (CAPEX)</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <span class="absolute left-4 text-sm font-bold text-slate-400">R$</span>
                            <input type="number" id="capex" value="100000" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                        </div>
                    </div>
                    <div class="input-group mt-6">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Preço de Venda</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <span class="absolute left-4 text-sm font-bold text-slate-400">R$</span>
                            <input type="number" step="0.01" id="precoVenda" value="1.70" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                            <span class="absolute right-4 text-xs font-bold text-slate-400">/kWh</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ENERGIA -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-orange-500 h-full flex flex-col">
                <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                    <span class="w-8 h-8 bg-slate-100 text-slate-600 rounded-lg flex items-center justify-center text-sm font-bold">2</span>
                    Custo da Energia (R$/kWh)
                </h2>
                <div class="flex-1 flex flex-col justify-between py-2">
                    <div class="input-group">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Cenário 1: Concessionária</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <span class="absolute left-4 text-sm font-bold text-slate-400">R$</span>
                            <input type="number" step="0.01" id="custoE1" value="1.00" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                        </div>
                    </div>
                    <div class="input-group mt-6">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Cenário 2: Usina Parceira</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <span class="absolute left-4 text-sm font-bold text-slate-400">R$</span>
                            <input type="number" step="0.01" id="custoE2" value="0.65" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                        </div>
                    </div>
                    <div class="input-group mt-6">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Cenário 3: Usina Própria</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <span class="absolute left-4 text-sm font-bold text-slate-400">R$</span>
                            <input type="number" step="0.01" id="custoE3" value="0.35" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                        </div>
                    </div>
                </div>
            </div>

            <!-- OPEX -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-orange-500 h-full flex flex-col">
                <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                    <span class="w-8 h-8 bg-slate-100 text-slate-600 rounded-lg flex items-center justify-center text-sm font-bold">3</span>
                    Custos Operacionais
                </h2>
                <div class="flex-1 grid grid-cols-2 gap-x-3 gap-y-7 py-2">
                    <div class="input-group">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Taxa App</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <input type="number" id="taxaApp" value="8" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                            <span class="absolute right-4 text-xs font-bold text-slate-400">%</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Imposto</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <input type="number" id="imposto" value="6" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                            <span class="absolute right-4 text-xs font-bold text-slate-400">%</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Seguro</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <span class="absolute left-4 text-sm font-bold text-slate-400">R$</span>
                            <input type="number" id="seguro" value="150" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">SLA</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <span class="absolute left-4 text-sm font-bold text-slate-400">R$</span>
                            <input type="number" id="sla" value="199" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Internet</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <span class="absolute left-4 text-sm font-bold text-slate-400">R$</span>
                            <input type="number" id="internet" value="150" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 text-left">Contador</label>
                        <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus-within:ring-2 focus-within:ring-orange-500 transition-all">
                            <span class="absolute left-4 text-sm font-bold text-slate-400">R$</span>
                            <input type="number" id="contador" value="350" class="w-full bg-transparent border-none focus:ring-0 outline-none font-semibold text-slate-700 text-sm h-full text-center">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div id="results-container" class="space-y-12">
            <!-- As tabelas serão geradas via JS -->
        </div>

    </main>
    </div> <!-- Fim relatorio-area -->

    <script>
        const inputs = [
            'potencia', 'capex', 'precoVenda', 'custoE1', 'custoE2', 'custoE3',
            'taxaApp', 'imposto', 'seguro', 'sla', 'internet', 'contador'
        ];

        const horasDia = [2, 3, 4, 6, 8, 10, 12];
        const cenarios = [
            { id: 1, nome: "Cenário 1: Concessionária", energyInputId: 'custoE1', theme: 'orange' },
            { id: 2, nome: "Cenário 2: Usina Parceira", energyInputId: 'custoE2', theme: 'orange' },
            { id: 3, nome: "Cenário 3: Usina Própria", energyInputId: 'custoE3', theme: 'orange' }
        ];

        const scenarioStates = { 1: true, 2: true, 3: true };

        const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        const percentFormatter = new Intl.NumberFormat('pt-BR', { style: 'percent', minimumFractionDigits: 1, maximumFractionDigits: 1 });

        window.toggleScenario = function(id) {
            scenarioStates[id] = !scenarioStates[id];
            calculate();
        };

        function calculate() {
            const data = {};
            inputs.forEach(id => data[id] = parseFloat(document.getElementById(id).value) || 0);

            const custosFixosTotais = data.seguro + data.sla + data.internet + data.contador;
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '';

            cenarios.forEach(cenario => {
                const custoEnergiaKwh = data[cenario.energyInputId];
                
                const isExpanded = scenarioStates[cenario.id];
                
                const tableHtml = `
                    <div class="bg-white rounded-3xl shadow-xl shadow-orange-100/50 border border-slate-200 overflow-hidden transition-all duration-300">
                        <div 
                            onclick="toggleScenario(${cenario.id})"
                            class="bg-orange-600 px-8 py-5 flex justify-between items-center bg-gradient-to-r from-orange-600 to-orange-500 cursor-pointer hover:brightness-105 active:brightness-95 transition-all select-none"
                        >
                            <div class="flex items-center gap-3">
                                <span class="text-white transform transition-transform duration-300 ${isExpanded ? 'rotate-0' : '-rotate-90'}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" />
                                    </svg>
                                </span>
                                <h3 class="text-white font-bold text-xl tracking-wide">${cenario.nome}</h3>
                            </div>
                            <span class="bg-white/20 text-white px-4 py-1 rounded-full text-xs backdrop-blur-sm font-medium">
                                Custo Energia: R$ ${custoEnergiaKwh.toFixed(2)}
                            </span>
                        </div>
                        <div class="table-container overflow-x-auto ${isExpanded ? '' : 'hidden'}">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-50 border-b border-slate-100">
                                        <th class="px-8 py-5 text-xs font-bold text-slate-400 uppercase tracking-widest sticky left-0 bg-slate-50 min-w-[200px]">Indicadores</th>
                                        ${horasDia.map(h => `<th class="px-6 py-5 text-sm font-extrabold text-slate-700 text-center bg-orange-50/30">${h}h/dia</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50">
                                    ${renderRow("Energia Mensal (kWh)", h => data.potencia * h * 30, false)}
                                    ${renderRow("Receita Bruta", h => (data.potencia * h * 30) * data.precoVenda, true)}
                                    ${renderRow("Custo Energia", h => (data.potencia * h * 30) * custoEnergiaKwh, true)}
                                    ${renderRow("Taxas e Impostos", h => {
                                        const rb = (data.potencia * h * 30) * data.precoVenda;
                                        return rb * (data.taxaApp / 100) + rb * (data.imposto / 100);
                                    }, true)}
                                    ${renderRow("Custos Fixos", h => custosFixosTotais, true)}
                                    ${renderRow("LUCRO LÍQUIDO", h => {
                                        const rb = (data.potencia * h * 30) * data.precoVenda;
                                        const ce = (data.potencia * h * 30) * custoEnergiaKwh;
                                        const tax = rb * (data.taxaApp / 100) + rb * (data.imposto / 100);
                                        return rb - ce - tax - custosFixosTotais;
                                    }, true, "font-black text-orange-600 bg-orange-50/50")}
                                    ${renderRow("Margem Líquida (%)", h => {
                                        const rb = (data.potencia * h * 30) * data.precoVenda;
                                        const ce = (data.potencia * h * 30) * custoEnergiaKwh;
                                        const tax = rb * (data.taxaApp / 100) + rb * (data.imposto / 100);
                                        const ll = rb - ce - tax - custosFixosTotais;
                                        return rb > 0 ? (ll / rb) : 0;
                                    }, false, "text-slate-500 font-medium italic", true)}
                                    ${renderIndicatorsRow("PAYBACK (MESES)", h => {
                                        const rb = (data.potencia * h * 30) * data.precoVenda;
                                        const ce = (data.potencia * h * 30) * custoEnergiaKwh;
                                        const tax = rb * (data.taxaApp / 100) + rb * (data.imposto / 100);
                                        const ll = rb - ce - tax - custosFixosTotais;
                                        if (ll <= 0) return "Inválido";
                                        return (data.capex / ll);
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                resultsContainer.innerHTML += tableHtml;
            });
        }

        function renderRow(label, calcFn, isMoney, extraClass = "", isPercent = false) {
            return `
                <tr>
                    <td class="px-8 py-4 text-xs font-bold text-slate-500 border-r border-slate-50 sticky left-0 bg-white z-10">${label}</td>
                    ${horasDia.map(h => {
                        const val = calcFn(h);
                        let display = val;
                        if (isMoney) display = formatter.format(val);
                        else if (isPercent) display = percentFormatter.format(val);
                        else if (typeof val === 'number') display = val.toLocaleString('pt-BR');
                        return `<td class="px-6 py-4 text-sm text-center ${extraClass}">${display}</td>`;
                    }).join('')}
                </tr>
            `;
        }

        function renderIndicatorsRow(label, calcFn) {
            return `
                <tr class="bg-slate-900">
                    <td class="px-8 py-5 text-xs font-black text-orange-400 uppercase tracking-widest border-r border-slate-800 sticky left-0 bg-slate-900 z-10">${label}</td>
                    ${horasDia.map(h => {
                        const val = calcFn(h);
                        const display = typeof val === 'number' 
                            ? val.toLocaleString('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) 
                            : val;
                        return `<td class="px-6 py-5 text-base font-black text-white text-center">${display}</td>`;
                    }).join('')}
                </tr>
            `;
        }


        // Lógica de Upload de Ícone
        document.getElementById('logoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('logoPreview');
                    const placeholder = document.getElementById('iconPlaceholder');
                    const box = document.getElementById('iconBox');
                    
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    box.classList.remove('border-dashed', 'bg-orange-50');
                    box.classList.add('border-solid', 'border-white');

                    // Salva a imagem no localStorage para persistência
                    localStorage.setItem('coenergyLogo', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // Lógica de Efeito de Scroll (Hide Entire Header)
        window.addEventListener('scroll', function() {
            const header = document.getElementById('mainHeader');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Recuperar imagem do localStorage ao carregar a página
        window.addEventListener('DOMContentLoaded', function() {
            const savedLogo = localStorage.getItem('coenergyLogo');
            if (savedLogo) {
                const preview = document.getElementById('logoPreview');
                const placeholder = document.getElementById('iconPlaceholder');
                const box = document.getElementById('iconBox');
                
                preview.src = savedLogo;
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
                box.classList.remove('border-dashed', 'bg-orange-50');
                box.classList.add('border-solid', 'border-white');
            }
        });

        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));

        // Lógica de Exportação de Relatório (PDF via html2canvas + jsPDF)
        window.exportReport = function() {
            const btn = document.querySelector('[data-html2canvas-ignore="true"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = "Gerando PDF...";
            btn.disabled = true;

            const area = document.getElementById('relatorio-area');

            // Garante que o scroll voltará ao topo para uma captura completa
            window.scrollTo(0, 0);

            setTimeout(() => {
                html2canvas(area, {
                    scale: 2, 
                    useCORS: true,
                    logging: false,
                    backgroundColor: "#f8fafc",
                    scrollY: -window.scrollY,
                    onclone: (clonedDoc) => {
                        const clonedArea = clonedDoc.getElementById('relatorio-area');
                        if (clonedArea) {
                            clonedArea.style.paddingTop = '20px'; // Margem de segurança superior
                            clonedArea.style.paddingBottom = '0';
                            clonedArea.style.margin = '0';
                        }
                    }
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    
                    const pdfWidth = 210;
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    // Cria o documento no tamanho EXATO do conteúdo (incluindo o novo padding)
                    const doc = new jsPDF('p', 'mm', [pdfWidth, pdfHeight]);
                    
                    // Adiciona a imagem preenchendo 100% da página
                    doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight, undefined, 'FAST');
                    
                    doc.save('Relatorio_CoenergyGo.pdf');
                    
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                });
            }, 300);
        };

        calculate();
    </script>
